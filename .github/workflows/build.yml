name: Build RunPod Desktop Image
on:
  # push:
  #   branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show disk usage (before)
        run: df -h

      - name: Free disk space (Ubuntu)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/boost /usr/local/.ghcup /usr/share/swift
          sudo docker system prune -af || true
          sudo apt-get clean

      - name: Show disk usage (after)
        run: df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (cached, no local load)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/runpod-blender-nx:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
